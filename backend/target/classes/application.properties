server.port=8080

# SQLite database - stored in user home dir
spring.datasource.url=jdbc:sqlite:${user.home}/.pennywise/pennywise.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable open-in-view warning
spring.jpa.open-in-view=false

# JWT
pennywise.jwt.secret=PennyWiseSecretKey2026ChangeThisInProdMustBe256BitsLong1234
pennywise.jwt.expiration=86400000

# Mail — configured to send OTP emails through Gmail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=lordman239@gmail.com
spring.mail.password=wyobfywqoqxdbqzi
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
pennywise.mail.from=noreply@pennywise.app

# Prevent startup failure when mail credentials are not set
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# Jackson - serialize dates as ISO strings not arrays
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null
